<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gap Scorer Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; font-size: 13px; background: #fff; color: #111; }

    /* ── topbar ── */
    #topbar {
      padding: 8px 16px; border-bottom: 1px solid #ccc;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; background: #fff; z-index: 10;
    }
    #topbar strong { font-size: 14px; }
    #prop-select { font-family: monospace; font-size: 12px; padding: 3px 6px; border: 1px solid #ccc; min-width: 240px; }

    /* ── tabs ── */
    .tabs {
      display: flex; border-bottom: 2px solid #111;
      padding: 0 16px; margin-top: 12px;
    }
    .tab {
      padding: 5px 16px; cursor: pointer; font-family: monospace; font-size: 12px;
      border: none; background: none; border-bottom: 2px solid transparent;
      margin-bottom: -2px; color: #888;
    }
    .tab.active { color: #111; border-bottom-color: #111; font-weight: bold; }

    .panel { display: none; padding: 16px; }
    .panel.active { display: block; }

    /* ── shared ── */
    .status { color: #888; font-size: 11px; margin-bottom: 10px; min-height: 16px; }
    select, button {
      font-family: monospace; font-size: 12px;
      padding: 4px 8px; border: 1px solid #ccc;
    }
    button.primary {
      border-color: #111; background: #111; color: #fff; cursor: pointer; padding: 4px 14px;
    }
    button.primary:disabled { background: #999; border-color: #999; cursor: default; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th {
      text-align: left; border-bottom: 2px solid #111;
      padding: 4px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: #555;
    }
    td { padding: 4px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }

    /* ── tab 1: pruning ── */
    .cat-section { margin-bottom: 20px; }
    .cat-label { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: .6px; color: #555; margin-bottom: 8px; }
    .cat-items { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge { padding: 3px 9px; border-radius: 3px; font-size: 12px; border: 1px solid #ddd; background: #f5f5f5; }
    .badge-same    { color: #aaa; border-color: #eee; background: #fafafa; }
    .badge-changed { background: #fff; border-color: #bbb; display: inline-flex; align-items: center; gap: 5px; }
    .badge-changed .old { text-decoration: line-through; color: #aaa; font-size: 11px; }
    .badge-changed .arr { color: #aaa; font-size: 10px; }
    .badge-changed .new { font-weight: bold; color: #111; }
    .badge-pruned  { text-decoration: line-through; color: #aaa; border-color: #eee; background: #fafafa; }

    /* ── tab 2: review analysis ── */
    #review-text-box {
      background: #f9f9f9; border: 1px solid #ddd;
      padding: 10px 12px; margin: 10px 0;
      white-space: pre-wrap; line-height: 1.5; font-size: 12px;
      max-height: 160px; overflow-y: auto;
    }
    .tag-yes { font-weight: bold; color: #111; }
    .tag-no  { color: #bbb; }

    .sentiment-bar-wrap {
      display: inline-block; width: 80px; height: 8px;
      background: #eee; vertical-align: middle; position: relative;
    }
    /* center line */
    .sentiment-bar-wrap::after {
      content: ''; position: absolute;
      left: 50%; top: 0; width: 1px; height: 100%; background: #ccc;
    }
    .sentiment-fill {
      position: absolute; height: 100%; top: 0;
    }
    .sentiment-pos { background: #2a2; }
    .sentiment-neg { background: #c33; }

    .detail-pip { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 2px; background: #111; }
    .detail-pip.empty { background: #eee; }

    /* ── tab 3: importance ── */
    #desc-box {
      background: #f9f9f9; border: 1px solid #ddd;
      padding: 10px 12px; margin-bottom: 12px;
      white-space: pre-wrap; line-height: 1.6; font-size: 12px;
      max-height: 200px; overflow-y: auto; color: #444;
    }
    .tier-critical  { color: #111; font-weight: bold; }
    .tier-important { color: #333; }
    .tier-moderate  { color: #777; }
    .tier-minor     { color: #bbb; }
    .tier-badge {
      display: inline-block; font-size: 10px; padding: 1px 6px;
      border-radius: 2px; border: 1px solid #ddd; background: #f5f5f5;
      vertical-align: middle; margin-left: 6px; color: #555;
    }
  </style>
</head>
<body>

<div id="topbar">
  <strong>Gap Scorer Tester</strong>
  <select id="prop-select" onchange="onPropertyChange()">
    <option value="">— select a property —</option>
  </select>
  <span class="status" id="topbar-status"></span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab(0)">1 · Amenity Pruning</button>
  <button class="tab"        onclick="switchTab(1)">2 · Review Analysis</button>
  <button class="tab"        onclick="switchTab(2)">3 · Importance Ranking</button>
</div>

<!-- ── Tab 1: Amenity Pruning ── -->
<div class="panel active" id="panel-0">
  <div class="status" id="status-0">Select a property to load amenities.</div>
  <div id="pruning-content"></div>
</div>

<!-- ── Tab 2: Review Analysis ── -->
<div class="panel" id="panel-1">
  <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
    <select id="review-select" style="min-width:320px;">
      <option value="">— select a review —</option>
    </select>
    <button class="primary" id="analyze-btn" onclick="runAnalysis()" disabled>Analyze</button>
  </div>
  <div id="review-text-box" style="display:none"></div>
  <div class="status" id="status-1"></div>
  <div id="analysis-content"></div>
</div>

<!-- ── Tab 3: Importance Ranking ── -->
<div class="panel" id="panel-2">
  <div class="status" id="status-2">Select a property, then click Rank.</div>
  <div id="desc-box" style="display:none"></div>
  <div style="margin-bottom:12px;">
    <button class="primary" id="rank-btn" onclick="runRanking()" disabled>Rank amenities</button>
  </div>
  <div id="ranking-content"></div>
</div>

<script>
const TIER_SCORES = { 1.0: 'critical', 0.67: 'important', 0.33: 'moderate', 0.0: 'minor' };

let currentProperty = null;
let propertyReviews = [];

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === idx));
}

// ── Property change ───────────────────────────────────────────────────────────
async function onPropertyChange() {
  currentProperty = document.getElementById('prop-select').value;
  if (!currentProperty) return;

  document.getElementById('topbar-status').textContent = 'loading…';

  // Load all three tabs in parallel
  await Promise.all([
    loadPruning(),
    loadReviews(),
    loadDescription(),
  ]);

  document.getElementById('topbar-status').textContent = '';
}

// ── Tab 1: Pruning ────────────────────────────────────────────────────────────
async function loadPruning() {
  document.getElementById('status-0').textContent = 'loading amenities…';
  const cats = await fetch(`/api/amenities/${currentProperty}/categorized`).then(r => r.json());

  let total = 0, nChanged = 0, nPruned = 0;
  cats.forEach(cat => cat.items.forEach(item => {
    total++;
    if (item.pruned)   nPruned++;
    if (item.changed)  nChanged++;
  }));

  document.getElementById('status-0').textContent =
    `${total} amenities · ${nChanged} renamed · ${nPruned} pruned · ${total - nChanged - nPruned} unchanged`;

  const html = cats.map(cat => {
    const badges = cat.items.map(item => {
      if (item.pruned) {
        return `<span class="badge badge-pruned">${esc(item.raw)}</span>`;
      } else if (item.changed) {
        return `<span class="badge badge-changed">
          <span class="old">${esc(item.raw)}</span>
          <span class="arr">→</span>
          <span class="new">${esc(item.normalized)}</span>
        </span>`;
      } else {
        return `<span class="badge badge-same">${esc(item.raw)}</span>`;
      }
    }).join('');
    return `<div class="cat-section">
      <div class="cat-label">${esc(cat.label)}</div>
      <div class="cat-items">${badges}</div>
    </div>`;
  }).join('');

  document.getElementById('pruning-content').innerHTML = html;
}

// ── Tab 2: Reviews ────────────────────────────────────────────────────────────
async function loadReviews() {
  propertyReviews = await fetch(`/api/gap/reviews/${currentProperty}`).then(r => r.json());

  const sel = document.getElementById('review-select');
  sel.innerHTML = '<option value="">— select a review —</option>';
  propertyReviews.forEach((r, i) => {
    const o = document.createElement('option');
    o.value = i;
    const label = r.title ? `${r.date} · ${r.title.slice(0, 60)}` : `${r.date} · ${r.text.slice(0, 60)}`;
    o.textContent = label;
    sel.appendChild(o);
  });

  sel.onchange = () => {
    const idx = sel.value;
    const box = document.getElementById('review-text-box');
    const btn = document.getElementById('analyze-btn');
    if (idx === '') {
      box.style.display = 'none';
      btn.disabled = true;
    } else {
      box.textContent = propertyReviews[idx].text;
      box.style.display = 'block';
      btn.disabled = false;
    }
    document.getElementById('analysis-content').innerHTML = '';
    document.getElementById('status-1').textContent = '';
  };

  document.getElementById('analyze-btn').disabled = true;
}

async function runAnalysis() {
  const idx = document.getElementById('review-select').value;
  if (idx === '' || !currentProperty) return;

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  document.getElementById('status-1').textContent = 'running 3 LLM calls in parallel…';
  document.getElementById('analysis-content').innerHTML = '';

  const rows = await fetch('/api/gap/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ property_id: currentProperty, review_text: propertyReviews[idx].text }),
  }).then(r => r.json());

  const mentioned = rows.filter(r => r.mentioned === 1);
  const silent    = rows.filter(r => r.mentioned === 0);
  document.getElementById('status-1').textContent =
    `${mentioned.length} / ${rows.length} amenities mentioned`;

  const tableRows = [...mentioned, ...silent].map(r => {
    const tagClass = r.mentioned ? 'tag-yes' : 'tag-no';

    // Sentiment bar
    let sentCell = '<td>—</td>';
    if (r.sentiment !== null && r.sentiment !== undefined) {
      const s    = r.sentiment;
      const pct  = Math.abs(s) * 50;
      const side = s >= 0 ? 'left:50%' : `left:${50 - pct}%`;
      const cls  = s >= 0 ? 'sentiment-pos' : 'sentiment-neg';
      sentCell = `<td>
        <span style="margin-right:5px; font-size:11px">${s >= 0 ? '+' : ''}${s.toFixed(1)}</span>
        <span class="sentiment-bar-wrap">
          <span class="sentiment-fill ${cls}" style="${side}; width:${pct}%"></span>
        </span>
      </td>`;
    }

    // Reason
    const hasNonNeutralSentiment = r.sentiment !== null && r.sentiment !== undefined && r.sentiment !== 0;
    let reasonCell;
    if (!r.mentioned) {
      reasonCell = `<td>—</td>`;
    } else if (r.reason && r.reason.length > 0) {
      const items = r.reason.map(s => `<li>${esc(s)}</li>`).join('');
      reasonCell = `<td style="font-size:11px; color:#444"><ul style="margin:0; padding-left:14px">${items}</ul></td>`;
    } else if (hasNonNeutralSentiment) {
      reasonCell = `<td style="font-size:11px; color:#bbb">no reason given</td>`;
    } else {
      reasonCell = `<td>—</td>`;
    }

    // Detail pips
    const d = r.detail || 0;
    const pips = [1,2,3,4].map(i =>
      `<span class="detail-pip${i > d ? ' empty' : ''}"></span>`
    ).join('');
    const detailCell = r.mentioned
      ? `<td><span style="margin-right:4px;font-size:11px">${d}/4</span>${pips}</td>`
      : `<td class="tag-no">—</td>`;

    return `<tr class="${tagClass}">
      <td>${r.mentioned ? '✓' : '·'}</td>
      <td class="${tagClass}">${esc(r.amenity)}</td>
      ${sentCell}
      ${reasonCell}
      ${detailCell}
    </tr>`;
  }).join('');

  document.getElementById('analysis-content').innerHTML = `
    <table>
      <thead><tr>
        <th></th><th>amenity</th><th>sentiment</th><th>reason</th><th>detail</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`;

  btn.disabled = false;
}

// ── Tab 3: Importance Ranking ─────────────────────────────────────────────────
async function loadDescription() {
  const { description } = await fetch(`/api/gap/description/${currentProperty}`).then(r => r.json());
  const box = document.getElementById('desc-box');
  box.textContent = description || '(no description available)';
  box.style.display = 'block';
  document.getElementById('rank-btn').disabled = !currentProperty;
  document.getElementById('status-2').textContent = 'Property description loaded. Click Rank to score amenity importance.';
}

async function runRanking() {
  if (!currentProperty) return;
  const btn = document.getElementById('rank-btn');
  btn.disabled = true;
  document.getElementById('status-2').textContent = 'ranking amenities…';
  document.getElementById('ranking-content').innerHTML = '';

  const rows = await fetch(`/api/gap/importance/${currentProperty}`).then(r => r.json());

  document.getElementById('status-2').textContent =
    `${rows.length} amenities ranked`;

  const tableRows = rows.map(r => {
    const tier = TIER_SCORES[r.score] ?? 'moderate';
    return `<tr>
      <td class="tier-${tier}">${esc(r.amenity)}</td>
      <td><span class="tier-badge">${tier}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('ranking-content').innerHTML = `
    <table>
      <thead><tr><th>amenity</th><th>tier</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`;

  btn.disabled = false;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function loadProperties() {
  const props = await fetch('/api/properties').then(r => r.json());
  const sel = document.getElementById('prop-select');
  props.forEach(p => {
    const o = document.createElement('option');
    o.value = p.property_id;
    o.textContent = `${p.city}, ${p.country} — ${p.property_id}`;
    sel.appendChild(o);
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadProperties();
</script>
</body>
</html>
