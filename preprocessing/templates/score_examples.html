<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Detail Score Examples</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      font-size: 13px;
      background: #fff;
      color: #111;
    }

    #topbar {
      padding: 8px 12px;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 10;
    }
    #topbar strong { font-size: 14px; }
    #city-filter, #limit-input {
      font-family: monospace; font-size: 12px;
      padding: 3px 6px; border: 1px solid #ccc;
    }
    #limit-input { width: 52px; }
    #load-btn {
      font-family: monospace; font-size: 12px;
      padding: 4px 12px; border: 1px solid #111;
      background: #111; color: #fff; cursor: pointer;
    }
    #load-btn:disabled { background: #999; border-color: #999; cursor: default; }
    #status { color: #888; font-size: 11px; }

    #content { padding: 16px 20px; }

    .score-section { margin-bottom: 28px; }

    .score-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      border-bottom: 2px solid #111;
      padding-bottom: 4px;
      margin-bottom: 10px;
    }
    .score-num {
      font-size: 22px;
      font-weight: bold;
      min-width: 28px;
    }
    .score-label { color: #555; font-size: 11px; }
    .score-count { color: #aaa; font-size: 11px; margin-left: auto; }

    .no-examples { color: #bbb; font-size: 12px; padding: 6px 0; }

    .example-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 10px 12px;
    }

    .card-amenity {
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .card-meta {
      color: #888;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .card-review {
      font-size: 12px;
      line-height: 1.55;
      color: #333;
      white-space: pre-wrap;
      max-height: 120px;
      overflow: hidden;
      position: relative;
    }
    .card-review.expanded { max-height: none; }
    .card-review:not(.expanded)::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: linear-gradient(transparent, #fff);
    }
    .expand-btn {
      font-family: monospace; font-size: 11px;
      color: #888; cursor: pointer;
      background: none; border: none;
      padding: 4px 0 0; display: block;
    }
    .expand-btn:hover { color: #111; }
  </style>
</head>
<body>

<div id="topbar">
  <strong>Detail Score Examples</strong>
  <select id="city-filter"><option value="">All cities</option></select>
  <input id="limit-input" type="number" value="20" min="1" max="100" title="reviews to sample">
  <button id="load-btn" onclick="loadExamples()">Load</button>
  <span id="status"></span>
</div>

<div id="content">
  <p style="color:#aaa; font-size:12px;">
    Select a city and sample size, then click Load. Each sampled review is scored — results are grouped by detail score.
  </p>
</div>

<script>
const SCORE_LABELS = {
  1:  'passing mention — no real description',
  2:  'passing mention — no real description',
  3:  'passing mention — no real description',
  4:  'some description — one specific observation',
  5:  'some description — one specific observation',
  6:  'some description — one specific observation',
  7:  'detailed — multiple observations or reasoning',
  8:  'detailed — multiple observations or reasoning',
  9:  'detailed — multiple observations or reasoning',
  10: 'exceptionally thorough',
};

async function loadCities() {
  const cities = await fetch('/api/cities').then(r => r.json());
  const sel = document.getElementById('city-filter');
  cities.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

async function loadExamples() {
  const city  = document.getElementById('city-filter').value;
  const limit = document.getElementById('limit-input').value || 20;
  const btn   = document.getElementById('load-btn');
  const status = document.getElementById('status');

  btn.disabled = true;
  status.textContent = `scoring ${limit} reviews…`;

  const url = `/api/score-examples?limit=${limit}${city ? '&city=' + encodeURIComponent(city) : ''}`;
  const results = await fetch(url).then(r => r.json());

  // Group by score
  const byScore = {};
  for (let s = 1; s <= 10; s++) byScore[s] = [];
  for (const item of results) {
    const s = Math.max(1, Math.min(10, item.score));
    byScore[s].push(item);
  }

  status.textContent = `${results.length} amenity mentions across ${limit} reviews`;
  btn.disabled = false;

  render(byScore);
}

function render(byScore) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  for (let s = 10; s >= 1; s--) {
    const items = byScore[s];
    const section = document.createElement('div');
    section.className = 'score-section';

    section.innerHTML = `
      <div class="score-header">
        <span class="score-num">${s}</span>
        <span class="score-label">${SCORE_LABELS[s]}</span>
        <span class="score-count">${items.length} example${items.length !== 1 ? 's' : ''}</span>
      </div>
    `;

    if (items.length === 0) {
      section.innerHTML += `<div class="no-examples">no examples in this sample</div>`;
    } else {
      const grid = document.createElement('div');
      grid.className = 'example-grid';
      for (const item of items) {
        grid.appendChild(makeCard(item));
      }
      section.appendChild(grid);
    }

    content.appendChild(section);
  }
}

function makeCard(item) {
  const card = document.createElement('div');
  card.className = 'card';

  const reviewEl = document.createElement('div');
  reviewEl.className = 'card-review';
  reviewEl.textContent = item.text;

  const expandBtn = document.createElement('button');
  expandBtn.className = 'expand-btn';
  expandBtn.textContent = 'show more';
  expandBtn.onclick = () => {
    const expanded = reviewEl.classList.toggle('expanded');
    expandBtn.textContent = expanded ? 'show less' : 'show more';
  };

  card.innerHTML = `
    <div class="card-amenity">${esc(item.amenity)}</div>
    <div class="card-meta">${esc(item.city)} · ${esc(item.date)}</div>
  `;
  card.appendChild(reviewEl);
  card.appendChild(expandBtn);
  return card;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadCities();
</script>
</body>
</html>
